apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pg-local-podmonitor
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: pg-local
  podMetricsEndpoints:
  - port: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pooler-local-podmonitor
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: pooler-local-rw
  podMetricsEndpoints:
  - port: metrics
  