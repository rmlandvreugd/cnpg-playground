apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-rbr-ver
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-rbr-ver
  allowCrossNamespaceImport: true
  datasource:
    access: proxy
    name: DS_LOKI
    type: loki
    url: http://loki.grafana.svc.cluster.local:3100
    jsonData:
      tlsSkipVerify: true
