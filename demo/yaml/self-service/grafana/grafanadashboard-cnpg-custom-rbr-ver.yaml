apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cnpg-custom-pg-rbr-ver
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana-rbr-ver"
  json: |
    {
      "title": "CNPG — Custom PostgreSQL Metrics",
      "uid": "cnpg-custom-pg-rbr-ver",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "pluginId": "prometheus",
            "label": "Datasource",
            "current": {},
            "hide": 0
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(pg_replication_lag_lag_seconds, cluster)",
            "label": "Cluster",
            "multi": true,
            "includeAll": true,
            "current": {}
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(pg_replication_lag_lag_seconds{cluster=~\"$cluster\"}, namespace)",
            "label": "Namespace",
            "multi": true,
            "includeAll": true,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Replication Lag by Instance",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 30 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "pg_replication_lag_lag_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Connection State Breakdown",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "active" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "idle" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "idle in transaction" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] }
            ]
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum by (state) (pg_stat_connections_total{cluster=~\"$cluster\", namespace=~\"$namespace\"})",
              "legendFormat": "{{state}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Database Size",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "targets": [
            {
              "expr": "pg_database_size_bytes{cluster=~\"$cluster\", namespace=~\"$namespace\"}",
              "legendFormat": "{{datname}} ({{pod}})",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Long-running Queries (>30s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "pg_long_running_queries_count{cluster=~\"$cluster\", namespace=~\"$namespace\"}",
              "legendFormat": "count ({{pod}})",
              "refId": "A"
            },
            {
              "expr": "pg_long_running_queries_max_age_seconds{cluster=~\"$cluster\", namespace=~\"$namespace\"}",
              "legendFormat": "max age s ({{pod}})",
              "refId": "B"
            }
          ]
        },
        {
          "id": 5,
          "title": "pgBouncer Pool Utilization",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "expr": "cnpg_pgbouncer_pool_active_client_conns{cluster=~\"$cluster\", namespace=~\"$namespace\"}",
              "legendFormat": "active client ({{pod}} {{database}})",
              "refId": "A"
            },
            {
              "expr": "cnpg_pgbouncer_pool_waiting_client_conns{cluster=~\"$cluster\", namespace=~\"$namespace\"}",
              "legendFormat": "waiting client ({{pod}} {{database}})",
              "refId": "B"
            },
            {
              "expr": "cnpg_pgbouncer_pool_active_server_conns{cluster=~\"$cluster\", namespace=~\"$namespace\"}",
              "legendFormat": "active server ({{pod}} {{database}})",
              "refId": "C"
            }
          ]
        }
      ]
    }
