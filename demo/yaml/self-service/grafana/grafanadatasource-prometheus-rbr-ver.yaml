apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-rbr-ver
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-rbr-ver
  allowCrossNamespaceImport: true
  datasource:
    access: proxy
    name: DS_PROMETHEUS
    type: prometheus
    url: http://prometheus-operated.prometheus-operator.svc.cluster.local:9090
    jsonData:
      timeInterval: 5s
      tlsSkipVerify: true
