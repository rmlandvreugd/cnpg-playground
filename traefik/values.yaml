nodeSelector:
  node-role.kubernetes.io/infra: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    add:
      - NET_BIND_SERVICE
    drop:
      - ALL

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

ingressRoute:
  dashboard:
    enabled: false

logs:
  general:
    level: "INFO"

accessLog:
  format: json
  filePath: ""          # stdout — Alloy tails all pod stdout
  bufferingSize: 0      # immediate flush
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop  # drop request headers by default (PII)
      names:
        User-Agent: keep
        X-Forwarded-For: keep

tracing:
  serviceName: traefik
  sampleRate: 1.0       # 100% sampling — playground; tune for prod
  otlp:
    enabled: true
    # transport and endpoint set at install time via --set (hub=gRPC, non-hub=HTTP)

additionalArguments:
  - "--global.checknewversion=false"
  - "--global.sendanonymoususage=false"
  - "--ping=true"
  - "--ping.entrypoint=traefik"
  - "--entrypoints.postgres.address=:5432"

ports:
  postgres:
    port: 5432
    expose:
      default: true
    exposedPort: 5432
    protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    memory: 128Mi

service:
  type: LoadBalancer
