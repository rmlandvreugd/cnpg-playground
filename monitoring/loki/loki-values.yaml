deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki
    s3:
      endpoint: http://objectstore-local.grafana.svc.cluster.local:9000
      region: us-east-1
      # accessKeyId and secretAccessKey injected via --set from RUSTFS_ROOT_USER/PASSWORD
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    allow_structured_metadata: true
    retention_period: 3d
    ingestion_rate_mb: 32
    ingestion_burst_size_mb: 64

singleBinary:
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/infra: ""
  tolerations:
    - key: node-role.kubernetes.io/infra
      operator: Exists
      effect: NoSchedule
  persistence:
    enabled: true
    size: 20Gi

# Disable distributed-mode components
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable bundled cache/minio
chunksCache:
  enabled: false
resultsCache:
  enabled: false
minio:
  enabled: false

# Disable self-monitoring and canary (require extra dependencies)
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: false

test:
  enabled: false
gateway:
  enabled: false
