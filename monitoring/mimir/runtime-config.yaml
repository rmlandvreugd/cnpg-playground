# Mimir per-tenant runtime overrides — documentation reference.
# This content is embedded in mimir-values.yaml under runtimeConfig.overrides
# and is NOT applied separately. The mimir-distributed chart serialises the
# runtimeConfig block into a ConfigMap mounted at /var/mimir/runtime.yaml.
#
# To add a new tenant: add an entry here AND update mimir-values.yaml.
# Tenant federation is enabled globally via tenant_federation.enabled: true
# in structuredConfig — query_federation.allowed_tenants was removed in Mimir 2.14+.

overrides:
  local:
    max_global_series_per_user: 500000
    max_query_lookback: 30d
    ingestion_rate: 100000
    ingestion_burst_size: 200000
  eu:
    max_global_series_per_user: 500000
    max_query_lookback: 30d
    ingestion_rate: 100000
    ingestion_burst_size: 200000
  us:
    max_global_series_per_user: 500000
    max_query_lookback: 30d
    ingestion_rate: 100000
    ingestion_burst_size: 200000
  tempo:
    max_global_series_per_user: 200000
    max_query_lookback: 7d
    ingestion_rate: 50000
