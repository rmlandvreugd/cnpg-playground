alloy:
  configMap:
    content: ""  # content injected via --set-file in setup.sh

  clustering:
    enabled: false

  # Allow Alloy to scrape pod logs cluster-wide
  mounts:
    varlog: false
    dockercontainers: false

controller:
  type: deployment
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/infra: ""
  tolerations:
    - key: node-role.kubernetes.io/infra
      operator: Exists
      effect: NoSchedule

# RBAC required for loki.source.kubernetes (pod log access) and events/cluster-wide logs
rbac:
  create: true
  extraRules:
    - apiGroups: [""]
      resources:
        - events
        - pods
        - pods/log
        - namespaces
        - nodes
        - nodes/proxy
      verbs: ["get", "list", "watch"]

serviceAccount:
  create: true
