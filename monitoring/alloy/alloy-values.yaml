alloy:
  configMap:
    content: ""  # content injected via --set-file in setup.sh

  clustering:
    enabled: false

  # Allow Alloy to scrape pod logs cluster-wide
  mounts:
    varlog: false
    dockercontainers: false

controller:
  type: deployment
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/infra: ""
  tolerations:
    - key: node-role.kubernetes.io/infra
      operator: Exists
      effect: NoSchedule

# RBAC required for loki.source.kubernetes, events, and prometheus.operator.* ServiceMonitor/PodMonitor scraping
rbac:
  create: true
  extraRules:
    - apiGroups: [""]
      resources:
        - events
        - pods
        - pods/log
        - namespaces
        - nodes
        - nodes/proxy
        - services
        - endpoints
        - configmaps
        - secrets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["monitoring.coreos.com"]
      resources:
        - servicemonitors
        - podmonitors
        - probes
        - prometheusrules
      verbs: ["get", "list", "watch"]
    - apiGroups: ["discovery.k8s.io"]
      resources: ["endpointslices"]
      verbs: ["get", "list", "watch"]
    - nonResourceURLs: ["/metrics", "/metrics/cadvisor", "/metrics/probes"]
      verbs: ["get"]

serviceAccount:
  create: true
